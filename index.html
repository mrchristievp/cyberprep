*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--color-background-tertiary);color:var(--color-text-primary);font-family:var(--font-sans);line-height:1.5;-webkit-font-smoothing:antialiased;}

.opt.correct{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success);}
.opt.wrong{background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger);}
.opt:disabled{cursor:default;}
.mi{padding:9px 12px;margin:4px 0;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;font-size:13px;color:var(--color-text-primary);line-height:1.4;font-family:var(--font-sans);}

.mi.mbad{border-color:#F0997B;background:#4A1B0C;color:#F5C4B3;}
.pstep{display:block;width:100%;text-align:left;padding:9px 12px;margin:5px 0;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:13px;color:var(--color-text-primary);font-family:var(--font-sans);line-height:1.4;}

.hint-box{background:var(--color-background-warning);border-left:3px solid #BA7517;padding:10px 14px;margin-bottom:8px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:13px;line-height:1.5;}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem 1.75rem;}

    else tr.style.cssText='background:var(--color-background-secondary);';
    row.forEach((val,ci)=>{
      const td=mk('td','padding:7px 9px;white-space:nowrap;border-bottom:0.5px solid var(--color-border-tertiary);',val);
      if(ci===log.resultCol){td.style.color=(val==='FAIL'?'var(--color-text-danger)':val==='SUCCESS'?'var(--color-text-success)':'var(--color-text-primary)');td.style.fontWeight='500';}
      if(isSus)td.style.color='#BA7517';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);tbl.appendChild(table);app.appendChild(tbl);
}
function rLogs(){
  const lab=LABS[labI];
  const tabs=mk('div','display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;');
  LABS.forEach((l,i)=>{const b=document.createElement('button');b.className='filt'+(labI===i?' on':'');b.textContent=l.tab;b.onclick=()=>{labI=i;iL();render();};tabs.appendChild(b);});app.appendChild(tabs);
  app.appendChild(mk('div','font-size:14px;color:var(--color-text-secondary);margin-bottom:0.75rem;line-height:1.55;',lab.intro));
  logTable(lab.log, partI>0||pgAns);
  const part=lab.parts[partI];
  const letter=String.fromCharCode(65+partI);
  app.appendChild(mk('div','font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;','Part '+letter+' of '+lab.parts.length+(part.type==='match'?' · matching':'')));
  app.appendChild(mk('div','font-weight:500;font-size:15px;margin-bottom:0.75rem;line-height:1.45;',part.q));
  if(part.type==='mc'){
    if(!pgAns)mkHints(part.hints,pgH,()=>{pgH++;render();});
    part.opts.forEach((opt,i)=>{
      const b=document.createElement('button');b.className='opt';b.textContent=opt;
      if(pgAns){if(i===part.ans)b.className+=' correct';else if(i===pgSel)b.className+=' wrong';b.disabled=true;}
      b.onclick=()=>{if(pgAns)return;pgSel=i;pgAns=true;render();};app.appendChild(b);
    });
  } else {
    if(!pgAns)mkHints(part.hints,pgH,()=>{pgH++;render();});
    if(!lmRight)lmRight=shuf(part.pairs.map((p,i)=>({r:p.r,id:i})));
    const grid=mk('div','display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.3fr);gap:8px;');
    const lc=mk('div'),rc=mk('div');
    part.pairs.forEach((p,i)=>{
      const e=document.createElement('div');e.className='mi';e.textContent=p.l;
      if(lmDone.has(i))e.className+=' mdone';else if(lmSel===i)e.className+=' msel';
      e.onclick=()=>{if(lmDone.has(i)||pgAns)return;lmSel=(lmSel===i)?null:i;render();};lc.appendChild(e);
    });
    lmRight.forEach(item=>{
      const e=document.createElement('div');e.className='mi';e.textContent=item.r;
      if(lmDone.has(item.id))e.className+=' mdone';
      e.onclick=()=>{
        if(lmSel===null||lmDone.has(item.id)||pgAns)return;
        if(item.id===lmSel){lmDone.add(item.id);lmSel=null;if(lmDone.size===part.pairs.length)pgAns=true;render();}
        else{e.className+=' mbad';setTimeout(()=>{if(e.classList.contains('mbad'))e.className='mi';},700);}
      };rc.appendChild(e);
    });
    grid.appendChild(lc);grid.appendChild(rc);app.appendChild(grid);
    if(!pgAns)app.appendChild(mk('div','margin-top:0.6rem;font-size:12px;color:var(--color-text-tertiary);',lmSel!==null?'Now click the matching item on the right.':'Click an item on the left, then its match on the right.'));
  }
  if(pgAns){
    mkExpl(part.expl);
    if(partI<lab.parts.length-1){
      const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.75rem';nb.textContent='Next part →';nb.onclick=()=>{partI++;resetPart();render();};app.appendChild(nb);
    } else {
      app.appendChild(mk('div','margin-top:0.75rem;background:var(--color-background-info);border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;color:var(--color-text-info);','Case complete — you worked through all '+lab.parts.length+' parts.'));
      if(labI<LABS.length-1){const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.6rem';nb.textContent='Next case →';nb.onclick=()=>{labI++;iL();render();};app.appendChild(nb);}
    }
  }
}
function rScen(){
  const sc=SCEN[sI];
  const pr=mk('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;font-size:13px;color:var(--color-text-secondary);');
  pr.innerHTML='<span>Scenario '+(sI+1)+' of '+SCEN.length+'</span><span style="background:var(--color-background-secondary);padding:3px 10px;border-radius:var(--border-radius-md);font-size:12px;">'+sc.topic+'</span>';app.appendChild(pr);
  app.appendChild(mk('div','background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1rem;font-size:14px;line-height:1.6;',sc.ctx));
  app.appendChild(mk('div','font-weight:500;font-size:15px;margin-bottom:0.75rem;',sc.q));
  if(!sA){mkHints(sc.hints,sH,()=>{sH++;render();});}
  sc.opts.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=opt;
    if(sA){if(i===sc.ans)b.className+=' correct';else if(i===sSel)b.className+=' wrong';b.disabled=true;}
    b.onclick=()=>{if(sA)return;sSel=i;sA=true;render();};app.appendChild(b);
  });
  if(sA){
    mkExpl(sc.expl);
    const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.75rem';
    if(sI<SCEN.length-1){nb.textContent='Next scenario →';nb.onclick=()=>{sI++;iSc();render();};}
    else{nb.textContent='Start over';nb.onclick=()=>{sI=0;iSc();render();};}
    app.appendChild(nb);
  }
}
function render(){
  app.innerHTML='';nav();
  if(mode==='flash')rFlash();
  else if(mode==='quiz')rQuiz();
  else if(mode==='match')rMatch();
  else if(mode==='parsons')rParsons();
  else if(mode==='logs')rLogs();
  else if(mode==='scen')rScen();
}
iF();iM();iP();iL();render();
</script>
</body>
</html>

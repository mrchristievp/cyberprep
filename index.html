html,body{margin:0;padding:0;}

.opt.wrong{background:var(--color-background-danger);border-color:var(--color-border-danger);color:var(--color-text-danger);}

.mi.mdone{border-color:#0F6E56;background:#E1F5EE;color:#085041;cursor:default;pointer-events:none;}
.mi.mbad{border-color:#993C1D;background:#FAECE7;color:#712B13;}

   hints:['Risk = likelihood × impact. Evaluate each dimension separately.','What is the impact if a water treatment plant\'s chemical pumps are compromised? High or low?','No known CVE means exploitation is less certain — what does that do to the likelihood component?'],
   expl:'Moderate risk. Critical infrastructure (water treatment) means high potential impact. But the absence of a known CVE means exploitation is less certain, reducing the likelihood component. This matches the AP framework\'s illustrative example: pumps accessible via username/password without MFA = moderate risk. High risk requires both high impact AND a highly likely exploit.'
  },
  {topic:'Risk assessment',
   ctx:'An organization\'s email server has not been patched in 6 months. Two months ago, a critical vulnerability (CVSS score 9.8) was published for this email server software, and security researchers confirm active exploitation in the wild.',
   q:'How would you classify the risk level of this configuration?',
   opts:['Low — it hasn\'t been visibly attacked yet','Moderate — the vulnerability exists but may not be discovered by adversaries','High — known critical vulnerability with active exploitation on a sensitive server','Moderate — email servers are not critical infrastructure'],
   ans:2,
   hints:['CVSS 9.8 is near-maximum severity. What does that imply about impact?','"Active exploitation in the wild" — is the likelihood of being attacked high or theoretical?','Email servers handle sensitive communications. Compromise = confidentiality and integrity breach.'],
   expl:'High risk. A CVSS 9.8 CVE with confirmed active exploitation means likelihood is very high — not theoretical. Email servers store sensitive communications, so impact is also high. This matches the AP framework\'s high-risk example: an unpatched email server with a known critical vulnerability that adversaries are already using.'
  },
  {topic:'Malware identification',
   ctx:'An adversary gains access to an HR system and installs software that silently records every keystroke typed by HR staff. The recorded data is automatically sent to an external server each night. HR staff notice nothing unusual.',
   q:'What type of malware most specifically describes what was installed?',
   opts:['Ransomware','Worm','Keylogger','Logic bomb'],
   ans:2,
   hints:['What is the malware\'s core action — what is it actually doing to the system?','It\'s not encrypting files, not self-replicating, and not waiting for a trigger condition.','The defining behavior is capturing and exfiltrating keystrokes.'],
   expl:'Keylogger. The malware records keystrokes and exfiltrates them — that is the defining behavior of a keylogger. Ransomware encrypts files for ransom. A worm spreads to other computers without interaction. A logic bomb waits for a trigger condition before activating. Spyware is the broader category; keylogger is the most precise answer here.'
  },
  {topic:'Access control models',
   ctx:'A government agency assigns every analyst a clearance level (e.g., SECRET). Documents are also labeled by classification level. A SECRET-cleared analyst must be able to read SECRET documents, but must NOT be allowed to copy or write data into UNCLASSIFIED documents — to prevent classified data from leaking downward.',
   q:'Which access control model and specific rule prevents writing to lower-classification objects?',
   opts:['DAC — the document owner sets permissions, so they could block writes','RBAC — job roles control what analysts can read and write','Bell-LaPadula — the Star (*) Security Property (no write down)','RuBAC — time-of-day rules restrict when analysts can write'],
   ans:2,
   hints:['The clearance levels are set by the organization, not by the document owner — which model does that rule out?','The restriction is specifically about WRITING to a LOWER level. Which model has a property for this?','Bell-LaPadula has two properties: Simple Security (no read up) and Star/(*) (no write down). Which applies here?'],
   expl:'Bell-LaPadula\'s Star (*) Security Property: a subject may not write to an object below their clearance level. This prevents a SECRET-cleared analyst from writing classified data to UNCLASSIFIED documents. The mnemonic is "write up, read down" (WURD). DAC would rely on owner permissions, which is too flexible for government classified environments.'
  },
  {topic:'Application attacks',
   ctx:'On a community forum, a user posts what appears to be a technical question. Their post contains hidden <script> tags. When other users visit that thread, the script executes in their browsers, stealing session cookies. Thousands of users are affected before the post is removed.',
   q:'What type of attack is this?',
   opts:['Reflected XSS (Type I) — malicious code in a crafted link','Stored XSS (Type II) — malicious code saved to the server and executed for all visitors','SQL injection — database query manipulation via the input field','Buffer overflow — the script overflows the server\'s memory'],
   ans:1,
   hints:['XSS has two types. What distinguishes Reflected from Stored?','Did victims have to click a special crafted link, or did the attack run for anyone who visited the page?','The script was saved to the forum server and persisted — that\'s the key distinguishing feature.'],
   expl:'Stored XSS (Type II). The malicious script was saved to the forum server inside the post. Every user who visits the thread triggers it automatically — no special link required. Reflected XSS (Type I) would require each victim to click a specially crafted URL that bounces the script off the server. The persistence and "any visitor is affected" behavior is the hallmark of Stored XSS.'
  },
  {topic:'Linux permissions',
   ctx:'A file report.txt needs these permissions: the owner needs read and write; the group needs read-only; all other users get no access at all.',
   q:'Which chmod command sets this correctly?',
   opts:['chmod 640 report.txt','chmod 644 report.txt','chmod 600 report.txt','chmod 664 report.txt'],
   ans:0,
   hints:['In numeric chmod, each of the three digits = owner / group / others. Each digit is a sum: read=4, write=2, execute=1.','Owner needs read (4) + write (2) = 6. Group needs read only = 4. Others need nothing = 0.','Put those three digits together: 6, 4, 0.'],
   expl:'chmod 640: owner=6 (read 4 + write 2), group=4 (read only), others=0 (no access). chmod 644 would give others read access. chmod 600 would deny the group read access too. chmod 664 would give the group write access. The digits always go owner → group → others, each being the sum of r(4)+w(2)+x(1).'
  }
];

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

let mode='flash',tf=0;
let fT=[],fI=0,fF=false;
let qT=[],qI=0,qSc=0,qA=false,qSel=null,qO=[];
let mT=[],mR=[],mSel=null,mD=new Set();
let pI=0,pB=[],pS=[],pCk=false,pH=-1;
let lI=0,lA=false,lSel=null,lH=-1;
let sI=0,sA=false,sSel=null,sH=-1;

function fil(){return tf===0?T:T.filter(x=>x.dom===tf);}
function iF(){fT=shuf(fil());fI=0;fF=false;}
function iQ(){qT=shuf(fil());qI=0;qSc=0;qA=false;qSel=null;bQO();}
function bQO(){if(qI>=qT.length)return;const p=fil();qO=shuf([qT[qI],...shuf(p.filter(x=>x.t!==qT[qI].t)).slice(0,3)]);}
function iM(){const p=shuf(fil());mT=p.slice(0,Math.min(8,p.length));mR=shuf([...mT]);mSel=null;mD=new Set();}
function iP(){const p=PARSONS[pI];pB=shuf(p.correct.map((s,i)=>({text:s,idx:i})));pS=[];pCk=false;pH=-1;}
function iL(){lA=false;lSel=null;lH=-1;}
function iSc(){sA=false;sSel=null;sH=-1;}
function setMode(m){mode=m;if(m==='flash')iF();else if(m==='quiz')iQ();else if(m==='match')iM();else if(m==='parsons')iP();else if(m==='logs')iL();else if(m==='scen')iSc();render();}
function setF(u){tf=u;if(mode==='flash')iF();else if(mode==='quiz')iQ();else if(mode==='match')iM();render();}

const app=document.getElementById('app');
function mk(tag,css,txt){const e=document.createElement(tag);if(css)e.style.cssText=css;if(txt!=null)e.textContent=txt;return e;}

function nav(){
  const r=mk('div','display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:0.75rem;flex-wrap:wrap;');
  [['flash','Flashcards'],['quiz','Quiz'],['match','Match'],['parsons','Order steps'],['logs','Log lab'],['scen','Scenarios']].forEach(([id,label])=>{
    const b=document.createElement('button');b.className='tab'+(mode===id?' active':'');b.textContent=label;b.onclick=()=>setMode(id);r.appendChild(b);
  });
  app.appendChild(r);
  if(['flash','quiz','match'].includes(mode)){
    const fr=mk('div','display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;');
    fr.appendChild(mk('span','font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-right:2px;','Security+ domain'));
    const ab=document.createElement('button');ab.className='filt'+(tf===0?' on':'');ab.textContent='All';ab.title='All domains';ab.onclick=()=>setF(0);fr.appendChild(ab);
    DOMAINS.forEach(d=>{
      const b=document.createElement('button');b.className='filt'+(tf===d.id?' on':'');b.textContent=d.short;b.title=d.full;b.onclick=()=>setF(d.id);fr.appendChild(b);
    });
    app.appendChild(fr);
  }
}

function mkHints(hints,hI,onH){
  for(let i=0;i<=hI;i++){
    const h=mk('div',null);h.className='hint-box';
    h.innerHTML='<span style="font-size:11px;font-weight:500;color:#BA7517;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:3px;">Hint '+(i+1)+' of '+hints.length+'</span>'+hints[i];
    app.appendChild(h);
  }
  if(hI<hints.length-1){
    const b=document.createElement('button');b.className='fbtn';b.style.marginBottom='0.75rem';
    b.textContent=hI<0?'Get a hint':'Next hint';b.onclick=onH;app.appendChild(b);
  }
}
function mkExpl(txt){const e=mk('div',null);e.className='expl-box';e.innerHTML='<span style="font-size:11px;font-weight:500;color:#0F6E56;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px;">Explanation</span>'+txt;app.appendChild(e);}
function mkBar(pct){const w=mk('div','height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1rem;');w.appendChild(mk('div','height:100%;border-radius:2px;background:#378ADD;width:'+pct+'%;'));app.appendChild(w);}

function rFlash(){
  const pool=fT;
  if(!pool.length){app.appendChild(mk('div','color:var(--color-text-secondary);','No terms.'));return;}
  const t=pool[fI];const dd=DOMAINS.find(d=>d.id===t.dom);
  app.appendChild(mk('div','font-size:13px;color:var(--color-text-secondary);margin-bottom:5px;',(fI+1)+' of '+pool.length));
  mkBar(Math.round(((fI+1)/pool.length)*100));
  const card=mk('div','min-height:185px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;gap:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;');
  card.appendChild(mk('div','font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;',fF?'Definition':'Term'));
  card.appendChild(mk('div','font-size:'+(fF?'15px':'22px')+';font-weight:500;max-width:500px;line-height:1.55;',fF?t.d:t.t));
  card.appendChild(mk('div','font-size:12px;color:var(--color-text-tertiary);margin-top:4px;',fF?'Click to flip back':'Click to reveal definition'));
  card.onclick=()=>{fF=!fF;render();};
  app.appendChild(card);
  app.appendChild(mk('div','display:inline-block;margin-top:0.5rem;padding:3px 10px;border-radius:var(--border-radius-md);font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);','Domain '+dd.id+' · '+dd.short));
  const nr=mk('div','display:flex;gap:8px;margin-top:0.75rem;justify-content:center;');
  const pv=document.createElement('button');pv.className='fbtn';pv.innerHTML='&#8592; Prev';pv.disabled=fI===0;pv.onclick=()=>{fI--;fF=false;render();};
  const sh=document.createElement('button');sh.className='fbtn';sh.innerHTML='&#8635; Shuffle';sh.onclick=()=>{fT=shuf(fil());fI=0;fF=false;render();};
  const nx=document.createElement('button');nx.className='fbtn';nx.innerHTML='Next &#8594;';nx.onclick=()=>{if(fI<pool.length-1){fI++;fF=false;}else{fT=shuf(fil());fI=0;fF=false;}render();};
  nr.appendChild(pv);nr.appendChild(sh);nr.appendChild(nx);app.appendChild(nr);
}

function rQuiz(){
  const pool=qT;
  if(!pool.length){app.appendChild(mk('div','color:var(--color-text-secondary);','No terms.'));return;}
  if(qI>=pool.length){
    const pct=Math.round((qSc/pool.length)*100);
    const end=document.createElement('div');end.className='card';end.style.textAlign='center';
    end.appendChild(mk('div','font-size:22px;font-weight:500;margin-bottom:6px;','Quiz complete'));
    end.appendChild(mk('div','font-size:32px;font-weight:500;margin:0.5rem 0;',pct+'%'));
    end.appendChild(mk('div','font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;',qSc+'/'+pool.length+' — '+(pct>=90?'excellent!':pct>=70?'good, review the misses.':'keep at it!')));
    const rb=document.createElement('button');rb.className='fbtn pri';rb.textContent='Restart';rb.onclick=()=>{iQ();render();};end.appendChild(rb);
    app.appendChild(end);return;
  }
  const t=pool[qI];
  const pr=mk('div','display:flex;justify-content:space-between;font-size:13px;color:var(--color-text-secondary);margin-bottom:5px;');
  pr.innerHTML='<span>Question '+(qI+1)+' of '+pool.length+'</span><span>Score: '+qSc+'</span>';app.appendChild(pr);
  mkBar(Math.round((qI/pool.length)*100));
  const card=document.createElement('div');card.className='card';
  card.appendChild(mk('div','font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;','What is...'));
  card.appendChild(mk('div','font-size:20px;font-weight:500;margin-bottom:1.25rem;line-height:1.4;',t.t));
  qO.forEach(opt=>{
    const b=document.createElement('button');b.className='opt';b.textContent=opt.d;
    if(qA){if(opt.t===t.t)b.className+=' correct';else if(opt.t===qSel)b.className+=' wrong';b.disabled=true;}
    b.onclick=()=>{if(qA)return;qSel=opt.t;qA=true;if(opt.t===t.t)qSc++;render();};
    card.appendChild(b);
  });
  app.appendChild(card);
  if(qA){const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.75rem';nb.textContent=qI<pool.length-1?'Next →':'See results →';nb.onclick=()=>{qI++;qA=false;qSel=null;bQO();render();};app.appendChild(nb);}
}

function rMatch(){
  if(!mT.length||mT.length<2){app.appendChild(mk('div','color:var(--color-text-secondary);','Not enough terms.'));return;}
  if(mD.size===mT.length){
    const win=document.createElement('div');win.className='card';win.style.textAlign='center';
    win.appendChild(mk('div','font-size:20px;font-weight:500;margin-bottom:8px;','All '+mT.length+' pairs matched!'));
    win.appendChild(mk('div','font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;','Nice — try another set.'));
    const b=document.createElement('button');b.className='fbtn pri';b.textContent='New set';b.onclick=()=>{iM();render();};win.appendChild(b);
    app.appendChild(win);return;
  }
  const pr=mk('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;font-size:13px;color:var(--color-text-secondary);');
  pr.innerHTML='<span>Match term → definition</span><span>'+mD.size+' / '+mT.length+'</span>';app.appendChild(pr);
  const grid=mk('div','display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.5fr);gap:8px;');
  const lc=mk('div'),rc=mk('div');
  mT.forEach(item=>{
    const e=document.createElement('div');e.className='mi';e.textContent=item.t;
    if(mD.has(item.t))e.className+=' mdone';else if(mSel===item.t)e.className+=' msel';
    e.onclick=()=>{if(mD.has(item.t))return;mSel=(mSel===item.t)?null:item.t;render();};lc.appendChild(e);
  });
  mR.forEach(item=>{
    const sd=item.d.length>100?item.d.slice(0,97)+'…':item.d;
    const e=document.createElement('div');e.className='mi';e.textContent=sd;
    if(mD.has(item.t))e.className+=' mdone';
    e.onclick=()=>{
      if(!mSel||mD.has(item.t))return;
      if(item.t===mSel){mD.add(item.t);mSel=null;render();}
      else{e.className+=' mbad';setTimeout(()=>{if(e.classList.contains('mbad')){e.className='mi';}},700);}
    };rc.appendChild(e);
  });
  grid.appendChild(lc);grid.appendChild(rc);app.appendChild(grid);
  app.appendChild(mk('div','margin-top:0.75rem;font-size:12px;color:var(--color-text-tertiary);',mSel?('"'+mSel+'" selected — click its definition on the right'):'Click a term on the left, then its definition on the right.'));
  const nb=document.createElement('button');nb.className='fbtn';nb.style.marginTop='0.5rem';nb.textContent='New set';nb.onclick=()=>{iM();render();};app.appendChild(nb);
}

function rParsons(){
  const p=PARSONS[pI];
  const tabs=mk('div','display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;');
  PARSONS.forEach((prob,i)=>{const b=document.createElement('button');b.className='filt'+(pI===i?' on':'');b.textContent=prob.title;b.onclick=()=>{pI=i;iP();render();};tabs.appendChild(b);});app.appendChild(tabs);
  app.appendChild(mk('div','font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.5;',p.desc));
  if(pB.length>0){
    app.appendChild(mk('div','font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;','Step bank — click to place'));
    const bk=mk('div','margin-bottom:1rem;');
    pB.forEach((item,bi)=>{const b=document.createElement('button');b.className='pstep';b.textContent=item.text;b.onclick=()=>{pS.push(item);pB.splice(bi,1);pCk=false;render();};bk.appendChild(b);});app.appendChild(bk);
  }
  app.appendChild(mk('div','font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;','Your sequence'));
  const sq=mk('div','margin-bottom:1rem;');
  if(!pS.length){sq.appendChild(mk('div','border:1px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:16px;text-align:center;font-size:13px;color:var(--color-text-tertiary);','Click steps from the bank above to build your sequence'));}
  else{
    pS.forEach((item,si)=>{
      const row=mk('div','display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;');
      row.appendChild(mk('span','font-size:12px;font-weight:500;color:var(--color-text-tertiary);min-width:18px;padding-top:10px;',(si+1)+'.'));
      let bg='var(--color-background-primary)',bc='var(--color-border-secondary)',tc='var(--color-text-primary)';
      if(pCk){if(item.idx===si){bg='var(--color-background-success)';bc='var(--color-border-success)';tc='var(--color-text-success)';}else{bg='var(--color-background-danger)';bc='var(--color-border-danger)';tc='var(--color-text-danger)';}}
      const step=mk('div','flex:1;background:'+bg+';border:0.5px solid '+bc+';color:'+tc+';border-radius:var(--border-radius-md);padding:9px 12px;font-size:13px;line-height:1.4;cursor:'+(pCk?'default':'pointer')+';');
      step.textContent=item.text;if(!pCk){step.title='Click to remove';step.onclick=()=>{pB.push(item);pS.splice(si,1);pCk=false;render();};}
      row.appendChild(step);sq.appendChild(row);
    });
  }app.appendChild(sq);
  const ctrl=mk('div','display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;');
  if(pS.length===p.correct.length&&!pCk){const b=document.createElement('button');b.className='fbtn pri';b.textContent='Check my order';b.onclick=()=>{pCk=true;render();};ctrl.appendChild(b);}
  const rb=document.createElement('button');rb.className='fbtn';rb.textContent='Reset';rb.onclick=()=>{iP();render();};ctrl.appendChild(rb);
  app.appendChild(ctrl);
  const allOk=pCk&&pS.every((item,i)=>item.idx===i);
  if(!allOk){mkHints(p.hints,pH,()=>{pH++;render();});}
  if(pCk){
    if(allOk){app.appendChild(mk('div','background:var(--color-background-success);border-left:3px solid #0F6E56;padding:12px 14px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:14px;color:var(--color-text-success);','All steps in the correct order — well done.'));}
    else{app.appendChild(mk('div','background:var(--color-background-danger);border-left:3px solid #993C1D;padding:12px 14px;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:13px;color:var(--color-text-danger);','Red steps are out of place. Click a step to remove it and try again, or reset.'));}
  }
}

function rLogs(){
  const log=LOGS[lI];
  const tabs=mk('div','display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;');
  LOGS.forEach((l,i)=>{const b=document.createElement('button');b.className='filt'+(lI===i?' on':'');b.textContent=l.title;b.onclick=()=>{lI=i;iL();render();};tabs.appendChild(b);});app.appendChild(tabs);
  app.appendChild(mk('div','font-size:14px;color:var(--color-text-secondary);margin-bottom:0.75rem;line-height:1.5;',log.desc));

  table.appendChild(tbody);tbl.appendChild(table);app.appendChild(tbl);
  app.appendChild(mk('div','font-weight:500;font-size:15px;margin-bottom:0.75rem;',log.q));
  if(!lA){mkHints(log.hints,lH,()=>{lH++;render();});}

    b.onclick=()=>{if(lA)return;lSel=i;lA=true;render();};app.appendChild(b);
  });
  if(lA){mkExpl(log.expl);if(lI<LOGS.length-1){const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.75rem';nb.textContent='Next scenario →';nb.onclick=()=>{lI++;iL();render();};app.appendChild(nb);}}
}

function rScen(){
  const sc=SCEN[sI];
  const pr=mk('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;font-size:13px;color:var(--color-text-secondary);');
  pr.innerHTML='<span>Scenario '+(sI+1)+' of '+SCEN.length+'</span><span style="background:var(--color-background-secondary);padding:3px 10px;border-radius:var(--border-radius-md);font-size:12px;">'+sc.topic+'</span>';app.appendChild(pr);
  app.appendChild(mk('div','background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1rem;font-size:14px;line-height:1.6;',sc.ctx));
  app.appendChild(mk('div','font-weight:500;font-size:15px;margin-bottom:0.75rem;',sc.q));
  if(!sA){mkHints(sc.hints,sH,()=>{sH++;render();});}
  sc.opts.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=opt;
    if(sA){if(i===sc.ans)b.className+=' correct';else if(i===sSel)b.className+=' wrong';b.disabled=true;}
    b.onclick=()=>{if(sA)return;sSel=i;sA=true;render();};app.appendChild(b);
  });
  if(sA){
    mkExpl(sc.expl);
    const nb=document.createElement('button');nb.className='fbtn pri';nb.style.marginTop='0.75rem';
    if(sI<SCEN.length-1){nb.textContent='Next scenario →';nb.onclick=()=>{sI++;iSc();render();};}
    else{nb.textContent='Start over';nb.onclick=()=>{sI=0;iSc();render();};}
    app.appendChild(nb);
  }
}

function render(){
  app.innerHTML='';nav();
  if(mode==='flash')rFlash();
  else if(mode==='quiz')rQuiz();
  else if(mode==='match')rMatch();
  else if(mode==='parsons')rParsons();
  else if(mode==='logs')rLogs();
  else if(mode==='scen')rScen();
}
iF();iM();iP();render();
</script>
</body>
</html>
